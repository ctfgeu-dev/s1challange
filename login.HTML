<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS :: SECURE LOGIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green:  #00ff88;
            --dim:    #00aa55;
            --dark:   #030d07;
            --panel:  #040f08;
            --border: #0a3a1a;
            --red:    #ff4444;
            --amber:  #ffaa00;
        }

        body {
            background: var(--dark);
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated scanlines */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,136,0.015) 2px,
                rgba(0,255,136,0.015) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* CRT vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 9;
        }

        /* Grid background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0%   { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 460px;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            color: var(--green);
            text-shadow: 0 0 20px var(--green), 0 0 60px rgba(0,255,136,0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 60px rgba(0,255,136,0.3); }
            50%       { text-shadow: 0 0 30px var(--green), 0 0 90px rgba(0,255,136,0.5); }
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            color: var(--dim);
            margin-top: 6px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--dim);
            margin-bottom: 20px;
            padding: 6px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 36px 32px;
            position: relative;
            box-shadow:
                0 0 0 1px rgba(0,255,136,0.05),
                inset 0 1px 0 rgba(0,255,136,0.06),
                0 20px 60px rgba(0,0,0,0.8);
        }

        .panel::before {
            content: 'AUTHENTICATION TERMINAL v2.4.1';
            position: absolute;
            top: -1px;
            left: 16px;
            font-size: 0.6rem;
            color: var(--dark);
            background: var(--green);
            padding: 1px 8px;
            letter-spacing: 0.1em;
        }

        .corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--green);
            border-style: solid;
            opacity: 0.5;
        }
        .corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
        .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
        .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

        .field-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--dim);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #020a04;
            border: 1px solid var(--border);
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            caret-color: var(--green);
            border-radius: 1px;
        }

        input:focus {
            border-color: var(--green);
            box-shadow: 0 0 10px rgba(0,255,136,0.15), inset 0 0 10px rgba(0,255,136,0.03);
        }

        .error-box {
            background: rgba(255,68,68,0.08);
            border: 1px solid rgba(255,68,68,0.3);
            color: var(--red);
            font-size: 0.75rem;
            padding: 10px 14px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        .error-box::before { content: '⚠ ACCESS DENIED: '; }

        .btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            padding: 13px;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            margin-top: 4px;
        }

        .btn:hover {
            background: rgba(0,255,136,0.08);
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }

        .btn:active { transform: scale(0.99); }

        .footer-note {
            text-align: center;
            font-size: 0.62rem;
            color: #1a4a2a;
            margin-top: 24px;
            letter-spacing: 0.1em;
        }

        /* Typing cursor at prompt */
        .prompt-line {
            font-size: 0.72rem;
            color: #0a5a20;
            margin-bottom: 24px;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--green);
            width: 0;
            animation: typeIn 2s steps(38) 0.3s forwards, cursorBlink 0.8s step-end 2.3s infinite;
        }

        @keyframes typeIn {
            to { width: 100%; }
        }

        @keyframes cursorBlink {
            0%, 100% { border-color: var(--green); }
            50%       { border-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <div class="header">
            <div class="logo">NEXUS</div>
            <div class="subtitle">CLASSIFIED OPERATIONS PORTAL &nbsp;|&nbsp; RESTRICTED ACCESS</div>
        </div>

        <div class="status-bar">
            <span><span class="status-dot"></span>SYSTEM ONLINE</span>
            <span>ENCRYPTION: AES-256</span>
            <span>SESSION: NONE</span>
        </div>

        <div class="panel">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="prompt-line">&gt; Awaiting credential input...</div>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="field-group">
                    <label>// USERNAME</label>
                    <input type="text" name="username" autocomplete="off" spellcheck="false" placeholder="enter_username" required>
                </div>
                <div class="field-group">
                    <label>// PASSWORD</label>
                    <input type="password" name="password" placeholder="••••••••••••" required>
                </div>
                <button class="btn" type="submit">AUTHENTICATE →</button>
            </form>
        </div>

        <div class="footer-note">
            UNAUTHORIZED ACCESS IS A FEDERAL OFFENSE &nbsp;·&nbsp; ALL SESSIONS LOGGED
        </div>
    </div>
</body>
</html>
